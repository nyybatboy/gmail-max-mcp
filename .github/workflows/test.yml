# CI: run the unit suite (node --test) on every push/PR. The tests are hermetic —
# pure MIME/reply-addressing/html-render units over lib/, no Gmail creds, no network.
name: test
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
